<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>爆款内容生成器</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Microsoft YaHei", Arial, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(217, 183, 105, 0.22), transparent 32%),
          linear-gradient(135deg, #080705 0%, #17120c 52%, #050504 100%);
        color: #f8ecd0;
        padding: 28px;
      }

      .page {
        width: min(1120px, 100%);
        margin: 0 auto;
      }

      .hero {
        padding: 34px;
        border: 1px solid rgba(217, 183, 105, 0.58);
        border-radius: 14px;
        background: rgba(20, 17, 13, 0.94);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: flex-start;
      }

      h1 {
        margin: 0 0 10px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(30px, 5vw, 46px);
        letter-spacing: 0;
      }

      .subtitle {
        margin: 0;
        color: #d9c99f;
        line-height: 1.8;
      }

      .nav-link {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border: 1px solid rgba(217, 183, 105, 0.72);
        border-radius: 999px;
        color: #fff7df;
        text-decoration: none;
        background: rgba(255, 250, 240, 0.06);
      }

      .workspace {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 20px;
        margin-top: 22px;
      }

      .panel {
        padding: 22px;
        border: 1px solid rgba(217, 183, 105, 0.48);
        border-radius: 14px;
        background: rgba(20, 17, 13, 0.94);
        box-shadow: 0 20px 54px rgba(0, 0, 0, 0.34);
      }

      .form {
        display: grid;
        gap: 16px;
      }

      label {
        display: grid;
        gap: 8px;
        color: #fff4d4;
        font-weight: 700;
      }

      select,
      input {
        width: 100%;
        min-height: 46px;
        padding: 0 13px;
        border: 1px solid rgba(217, 183, 105, 0.7);
        border-radius: 8px;
        background: #fffaf0;
        color: #1f1a14;
        font-size: 15px;
        outline: none;
      }

      .hint {
        color: #d9c99f;
        font-size: 13px;
        font-weight: 400;
        line-height: 1.6;
      }

      .emotion-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .choice {
        position: relative;
        display: block;
      }

      .choice input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .choice span {
        display: block;
        padding: 11px 12px;
        border: 1px solid rgba(217, 183, 105, 0.58);
        border-radius: 8px;
        background: rgba(255, 250, 240, 0.05);
        color: #f6e7bf;
        cursor: pointer;
        text-align: center;
      }

      .choice input:checked + span {
        background: #fffaf0;
        color: #171411;
        border-color: #d9b769;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      button {
        min-height: 46px;
        border: 1px solid #d9b769;
        border-radius: 999px;
        background: #171411;
        color: #fff7df;
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 0 18px rgba(217, 183, 105, 0.28);
      }

      button.secondary {
        background: rgba(255, 250, 240, 0.06);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.62;
      }

      .error {
        min-height: 22px;
        color: #ffd2c8;
        line-height: 1.6;
      }

      .result-toolbar {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 14px;
      }

      .result-toolbar h2 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 24px;
      }

      .copy-button {
        min-height: 38px;
        padding: 0 16px;
        font-size: 13px;
      }

      .output-list {
        display: grid;
        gap: 18px;
      }

      .output-card {
        padding: 18px;
        border: 1px solid rgba(217, 183, 105, 0.42);
        border-radius: 12px;
        background: rgba(255, 250, 240, 0.94);
        color: #241f18;
      }

      .output-card h3 {
        margin: 0 0 12px;
        color: #171411;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.85;
        font-family: "Microsoft YaHei", Arial, sans-serif;
        font-size: 14px;
      }

      @media (max-width: 860px) {
        body {
          padding: 16px;
        }

        .workspace {
          grid-template-columns: 1fr;
        }

        .topbar,
        .result-toolbar {
          flex-direction: column;
          align-items: stretch;
        }

        h1 {
          font-size: 34px;
          line-height: 1.18;
        }

        .hero,
        .panel {
          padding: 20px;
        }

        .actions {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 420px) {
        body {
          padding: 12px;
        }

        h1 {
          font-size: 30px;
        }

        .hero,
        .panel {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="topbar">
          <div>
            <h1>爆款内容生成器</h1>
            <p class="subtitle">
              情绪驱动 + 现实映射 + 视觉增强 + 用户代入，用于小红书/抖音内容批量起号。
            </p>
          </div>
          <a class="nav-link" href="/">返回分析系统</a>
        </div>
      </section>

      <section class="workspace">
        <aside class="panel">
          <form class="form" id="contentForm">
            <label>
              人生结构
              <select id="structure">
                <option value="波动成长型">波动成长型</option>
                <option value="早发型结构">早发型结构</option>
                <option value="稳定积累型">稳定积累型</option>
                <option value="后发型结构">后发型结构</option>
              </select>
            </label>

            <label>
              平台
              <select id="platform">
                <option value="小红书">小红书</option>
                <option value="抖音">抖音</option>
                <option value="视频号">视频号</option>
              </select>
            </label>

            <label>
              目标人群
              <input id="audience" value="正在经历人生转折的人" />
              <span class="hint">例如：25-35岁迷茫女性、刚分手的人、想转行的人</span>
            </label>

            <label>
              情绪方向
              <div class="emotion-grid">
                <label class="choice"><input name="emotion" type="radio" value="迷茫" checked /><span>迷茫</span></label>
                <label class="choice"><input name="emotion" type="radio" value="焦虑" /><span>焦虑</span></label>
                <label class="choice"><input name="emotion" type="radio" value="转折" /><span>转折</span></label>
                <label class="choice"><input name="emotion" type="radio" value="压抑" /><span>压抑</span></label>
              </div>
            </label>

            <div class="actions">
              <button type="submit" id="singleButton">生成单条</button>
              <button type="button" class="secondary" id="batchButton">批量生成</button>
            </div>

            <p class="error" id="error"></p>
          </form>
        </aside>

        <section class="panel">
          <div class="result-toolbar">
            <h2>生成结果</h2>
            <button class="copy-button secondary" id="copyButton" type="button" disabled>复制全部</button>
          </div>
          <div class="output-list" id="outputList">
            <article class="output-card">
              <h3>等待生成</h3>
              <pre>选择结构、平台和情绪方向后，点击生成即可。</pre>
            </article>
          </div>
        </section>
      </section>
    </main>

    <script>
      const form = document.getElementById("contentForm");
      const structure = document.getElementById("structure");
      const platform = document.getElementById("platform");
      const audience = document.getElementById("audience");
      const singleButton = document.getElementById("singleButton");
      const batchButton = document.getElementById("batchButton");
      const copyButton = document.getElementById("copyButton");
      const error = document.getElementById("error");
      const outputList = document.getElementById("outputList");
      let latestContent = "";

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        await generateSingle();
      });

      batchButton.addEventListener("click", generateBatch);
      copyButton.addEventListener("click", async () => {
        if (!latestContent) return;
        await navigator.clipboard.writeText(latestContent);
        copyButton.textContent = "已复制";
        window.setTimeout(() => {
          copyButton.textContent = "复制全部";
        }, 1200);
      });

      async function generateSingle() {
        setLoading(true, "单条生成中...");
        try {
          const data = await requestJson("/content/generate", {
            structure: structure.value,
            emotion: getEmotion(),
            platform: platform.value,
            audience: audience.value.trim() || "正在经历人生转折的人",
          });
          renderOutputs([data]);
        } catch (err) {
          error.textContent = err.message || "生成失败，请确认后端服务正常运行。";
        } finally {
          setLoading(false);
        }
      }

      async function generateBatch() {
        setLoading(true, "批量生成中...");
        try {
          const data = await requestJson("/content/batch_generate", {
            structure: structure.value,
            emotions: ["迷茫", "焦虑", "转折", "压抑"],
            platform: platform.value,
            audience: audience.value.trim() || "正在经历人生转折的人",
          });
          renderOutputs(data);
        } catch (err) {
          error.textContent = err.message || "批量生成失败，请确认后端服务正常运行。";
        } finally {
          setLoading(false);
        }
      }

      function renderOutputs(items) {
        latestContent = items
          .map((item, index) => `# ${index + 1} ${item.emotion} / ${item.structure}\n\n${item.content}`)
          .join("\n\n====================\n\n");
        copyButton.disabled = !latestContent;
        outputList.innerHTML = items
          .map((item, index) => {
            return `
              <article class="output-card">
                <h3>${index + 1}. ${escapeHtml(item.emotion)} / ${escapeHtml(item.structure)}</h3>
                <pre>${escapeHtml(item.content)}</pre>
              </article>
            `;
          })
          .join("");
      }

      async function requestJson(url, payload) {
        const response = await fetchWithTimeout(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });
        if (!response.ok) {
          throw new Error("请求失败：" + response.status);
        }
        return response.json();
      }

      async function fetchWithTimeout(url, options, timeout = 15000) {
        const controller = new AbortController();
        const timer = window.setTimeout(() => controller.abort(), timeout);
        try {
          return await fetch(url, { ...options, signal: controller.signal });
        } catch (err) {
          if (err.name === "AbortError") {
            throw new Error("生成时间过长，请稍后再试。");
          }
          throw err;
        } finally {
          window.clearTimeout(timer);
        }
      }

      function setLoading(isLoading, text = "") {
        singleButton.disabled = isLoading;
        batchButton.disabled = isLoading;
        singleButton.textContent = isLoading ? text : "生成单条";
        batchButton.textContent = isLoading ? "请稍候" : "批量生成";
        error.textContent = "";
      }

      function getEmotion() {
        const selected = document.querySelector('input[name="emotion"]:checked');
        return selected ? selected.value : "迷茫";
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>
