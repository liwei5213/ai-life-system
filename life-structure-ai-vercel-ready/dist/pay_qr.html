<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>微信扫码支付</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: "Microsoft YaHei", Arial, sans-serif;
        background:
          radial-gradient(circle at top, rgba(217, 183, 105, 0.2), transparent 34%),
          linear-gradient(135deg, #080706 0%, #17120c 52%, #050504 100%);
        color: #fff7df;
      }

      .card {
        width: 100%;
        max-width: 460px;
        padding: 30px;
        border: 1px solid rgba(217, 183, 105, 0.58);
        border-radius: 16px;
        background: rgba(20, 17, 13, 0.96);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.46);
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 29px;
        line-height: 1.3;
      }

      .subtitle {
        margin: 0 0 22px;
        color: #d9c99f;
        line-height: 1.7;
      }

      .price-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 22px;
      }

      .price {
        color: #f0d58a;
        font-size: 36px;
        font-weight: 700;
      }

      .price-label {
        color: #fff1c8;
        font-weight: 700;
      }

      .badge {
        padding: 5px 9px;
        border: 1px solid #d9b769;
        border-radius: 999px;
        color: #d9b769;
        font-size: 12px;
      }

      .qr-panel {
        padding: 18px;
        border: 1px solid rgba(217, 183, 105, 0.42);
        border-radius: 14px;
        background: rgba(255, 248, 232, 0.08);
      }

      .qr-image {
        width: min(300px, 100%);
        height: auto;
        display: block;
        margin: 0 auto 14px;
        border: 8px solid #fff;
        border-radius: 8px;
        background: #fff;
        object-fit: contain;
        box-shadow: 0 16px 34px rgba(0, 0, 0, 0.32);
      }

      .qr-fallback {
        width: 220px;
        min-height: 220px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 14px;
        padding: 18px;
        border: 10px solid #fff;
        border-radius: 8px;
        background: #fffaf0;
        color: #4c3b1a;
        font-weight: 700;
        line-height: 1.7;
        box-shadow: 0 16px 34px rgba(0, 0, 0, 0.32);
      }

      .qr-fallback[hidden] {
        display: none !important;
      }

      .tip {
        margin: 0;
        color: #fff1c8;
        font-weight: 700;
      }

      .phone-pay-tip {
        margin: 10px 0 0;
        color: #d9c99f;
        font-size: 13px;
        line-height: 1.7;
      }

      .confirm-copy {
        margin: 18px 0 14px;
        color: #e8dcc3;
        line-height: 1.8;
      }

      .trust {
        margin: 0 0 18px;
        color: #bda878;
        font-size: 13px;
        line-height: 1.7;
      }

      button {
        width: 100%;
        padding: 14px 18px;
        border: 1px solid #d9b769;
        border-radius: 999px;
        background: linear-gradient(135deg, #f0d58a, #b88c37);
        color: #18130d;
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 0 24px rgba(217, 183, 105, 0.34);
      }

      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .message,
      .report {
        margin-top: 16px;
        color: #fff1c8;
        line-height: 1.8;
        text-align: left;
        white-space: pre-wrap;
      }

      .report {
        padding: 16px;
        border: 1px solid rgba(217, 183, 105, 0.38);
        border-radius: 10px;
        background: rgba(255, 248, 232, 0.08);
      }

      @media (max-width: 520px) {
        body {
          align-items: flex-start;
          padding: 14px;
        }

        .card {
          padding: 22px 16px;
          border-radius: 14px;
        }

        h1 {
          font-size: 25px;
        }

        .subtitle {
          font-size: 14px;
        }

        .price {
          font-size: 32px;
        }

        .qr-panel {
          padding: 14px;
        }

        .qr-image {
          width: 100%;
          max-width: 320px;
        }

        button {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>解锁你的完整人生结构报告</h1>
      <p class="subtitle">支付完成后系统自动生成你的专属分析报告（约10–30秒）</p>

      <div class="price-row">
        <span class="price">¥29</span>
        <span class="price-label">人生结构分析报告</span>
        <span class="badge">限时体验价</span>
      </div>

      <section class="qr-panel">
        <img
          class="qr-image"
          alt="微信支付二维码图片"
          src="/assets/wechat_qr-Bd80akZS.png"
          onerror="this.hidden = true; document.getElementById('qrFallback').hidden = false;"
        />
        <div class="qr-fallback" id="qrFallback" hidden>
          请将微信收款码图片保存为<br />
          assets/wechat_qr.png
        </div>
        <p class="tip">请使用微信扫码完成支付</p>
        <p class="phone-pay-tip">手机打开时，可长按二维码识别支付，或截图后在微信中识别。</p>
      </section>

      <p class="confirm-copy">
        支付完成后，请点击下方按钮获取报告。你的报告将基于结构模型自动生成，请稍等片刻。
      </p>
      <p class="trust">已有 1000+ 用户完成分析 · 系统自动生成，无人工干预</p>

      <button id="paidButton" type="button">👉 我已完成支付</button>
      <p class="message" id="message"></p>
      <div class="report" id="report" hidden></div>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const paidButton = document.getElementById("paidButton");
      const message = document.getElementById("message");
      const report = document.getElementById("report");

      paidButton.addEventListener("click", async () => {
        const pending = JSON.parse(
          localStorage.getItem("lifeStructurePendingUnlock") || "{}"
        );
        const structure = params.get("structure") || pending.structure || "";

        paidButton.disabled = true;
        paidButton.textContent = "正在验证支付信息...";
        message.textContent = "正在验证支付信息，请稍候...";
        report.hidden = true;

        try {
          await new Promise((resolve) => setTimeout(resolve, 3000));

          const response = await fetch("/unlock_report", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              structure,
              birth_time: pending.birth_time || "",
              gender: pending.gender || "",
              psychology_state: pending.psychology_state || {},
              payment_status: "paid",
            }),
          });

          if (!response.ok) {
            throw new Error("确认失败：" + response.status);
          }

          const data = await response.json();
          if (data.full_report === "请先完成微信支付解锁完整报告") {
            message.textContent = data.full_report;
            return;
          }

          message.textContent = "支付已确认，完整报告已生成。";
          report.textContent = data.full_report;
          report.hidden = false;
          localStorage.removeItem("lifeStructurePendingUnlock");
        } catch (err) {
          message.textContent = err.message || "确认失败，请稍后重试。";
        } finally {
          paidButton.disabled = false;
          paidButton.textContent = "👉 我已完成支付";
        }
      });
    </script>
  </body>
</html>
